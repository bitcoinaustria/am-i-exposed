name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust toolchain + wasm-pack for Boltzmann WASM build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            boltzmann-rs/target
          key: rust-wasm-${{ hashFiles('boltzmann-rs/Cargo.lock') }}
          restore-keys: rust-wasm-

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build Boltzmann WASM
        run: pnpm build:wasm

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping IndexNow
        run: |
          KEY="29dadd2b-9bd0-4e5e-afb9-8e0c12f88ba9"
          for path in "/" "/methodology/" "/setup-guide/" "/about/" "/faq/" "/glossary/"; do
            curl -sf "https://api.indexnow.org/indexnow?url=https://am-i.exposed${path}&key=${KEY}" || true
          done
